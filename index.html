<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实时环境监控</title>
    <script src="js/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/mqtt-client.js"></script>
    <script src="js/chart-utils.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .container {
            width: 100%;
            height: 100%;
            background: white;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        .title {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin: 0;
            flex-shrink: 0;
        }
        /* 连接状态：仅显示圆点，hover显示文字 */
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer; /* 手型提示 */
        }
        /* 状态文字：默认隐藏，hover显示 */
        .status-text {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            visibility: hidden; /* 默认隐藏 */
            opacity: 0;
            transition: all 0.3s ease;
        }
        /* hover时显示文字 */
        .status:hover .status-text {
            visibility: visible;
            opacity: 1;
        }
        /* 状态圆点：默认红色（失败），成功变绿色 */
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #e74c3c; /* 失败：红色 */
            transition: background-color 0.3s ease;
        }
        /* 连接成功：圆点变绿色 */
        .status.connected .status-dot {
            background-color: #27ae60; /* 成功：绿色 */
        }
        /* 连接中：圆点灰色 */
        .status.connecting .status-dot {
            background-color: #999; /* 连接中：灰色 */
        }
        /* 四数据卡片 */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            flex-shrink: 0;
            padding: 0 5px;
        }
        .data-card {
            padding: 15px 10px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .data-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #42b983, #35495e);
            transition: left 0.3s ease;
        }
        .data-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .data-card:hover::before {
            left: 0;
        }
        .data-card h3 {
            color: #666;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            transition: all 0.5s ease;
        }
        .unit {
            font-size: 16px;
            color: #999;
            margin-left: 6px;
        }
        /* 图表区域 */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex: 1;
            padding: 0 5px;
            min-height: 0;
        }
        .chart-container {
            height: 100%;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        /* 响应式适配 */
        @media (max-width: 900px) {
            .data-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-container {
                grid-template-columns: 1fr;
            }
            .data-value {
                font-size: 24px;
            }
        }
        @media (max-width: 500px) {
            .data-grid {
                grid-template-columns: 1fr;
            }
            .title {
                font-size: 20px;
            }
            .status {
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">实时环境监控</h1>
        
        <!-- 连接状态：仅显示圆点，hover显示文字 -->
        <div class="status connecting" id="mqtt-status">
            <span class="status-text">连接中...</span>
            <span class="status-dot"></span>
        </div>
        
        <div class="data-grid">
            <div class="data-card">
                <h3>温度</h3>
                <div class="data-value" id="temperature">0.0</div>
                <span class="unit">℃</span>
            </div>
            <div class="data-card">
                <h3>湿度</h3>
                <div class="data-value" id="humidity">0.0</div>
                <span class="unit">%</span>
            </div>
            <div class="data-card">
                <h3>风速</h3>
                <div class="data-value" id="windSpeed">0.0</div>
                <span class="unit">m/s</span>
            </div>
            <div class="data-card">
                <h3>光照强度</h3>
                <div class="data-value" id="illumination">0</div>
                <span class="unit">lux</span>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-container" id="main-chart"></div>
            <div class="chart-container" id="light-chart"></div>
        </div>
    </div>

    <script>
        window.onload = function() {
            initMQTTClient();
            initCharts();

            window.addEventListener('resize', () => {
                if (window.mainChart) window.mainChart.resize();
                if (window.lightChart) window.lightChart.resize();
            });

            window.onbeforeunload = function() {
                if (window.mqttClient && window.mqttClient.isConnected()) {
                    window.mqttClient.disconnect();
                }
            };
        };
    </script>
</body>
</html>
