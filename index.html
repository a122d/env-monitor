<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>实时环境监控</title>
    <!-- 引入外部样式 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 提前引入核心JS库 -->
    <script src="js/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 标题容器 -->
        <div class="title-container" id="titleContainer">
            <!-- 菜单容器 -->
            <div class="menu-container">
                <div class="hamburger-menu" id="hamburgerMenu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </div>
                <!-- 下拉菜单 -->
                <ul class="dropdown-menu" id="dropdownMenu">
                    <li class="dropdown-item" data-action="mqtt-config">MQTT连接配置</li>
                    <li class="dropdown-item" data-action="data-clear">清空历史数据</li>
                    <li class="dropdown-divider"></li>
                    <li class="dropdown-item" data-action="chart-setting">图表显示设置</li>
                    <li class="dropdown-item" data-action="data-export">导出监控数据</li>
                    <li class="dropdown-divider"></li>
                    <li class="dropdown-item" data-action="about">关于系统</li>
                </ul>
            </div>

            <div class="title-wrapper">
                <h1 class="main-title">实时环境监<span class="last-char">控</span></h1>
            </div>
            
            <!-- 状态点 -->
            <div class="status connected" id="mqtt-status">
                <span class="status-dot"></span>
                <span class="status-text">已连接</span>
            </div>
        </div>
        
        <!-- 数据卡片 -->
        <div class="data-grid">
            <div class="data-card">
                <h3>温度</h3>
                <div class="data-value" id="temperature">0</div>
                <span class="unit">℃</span>
            </div>
            <div class="data-card">
                <h3>湿度</h3>
                <div class="data-value" id="humidity">0</div>
                <span class="unit">%</span>
            </div>
            <div class="data-card">
                <h3>风速</h3>
                <div class="data-value" id="windSpeed">0</div>
                <span class="unit">m/s</span>
            </div>
            <div class="data-card">
                <h3>光照强度</h3>
                <div class="data-value" id="illumination">0</div>
                <span class="unit">lux</span>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-container">
            <div class="chart-container" id="main-chart"></div>
            <div class="chart-container" id="light-chart"></div>
        </div>
    </div>

    <!-- 按依赖顺序引入JS文件 -->
    <script src="js/mqtt-client.js"></script>
    <script src="js/chart-utils.js"></script>
    <script src="js/menu-utils.js"></script>
    <script src="js/main-utils.js"></script>
</body>
</html>
