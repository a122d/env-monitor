<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端核心配置：禁止缩放，适配设备宽度 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实时环境监控</title>
    <!-- MQTT核心库 -->
    <script src="js/mqttws31.min.js"></script>
    <!-- ECharts图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 业务逻辑 -->
    <script src="js/mqtt-client.js"></script>
    <script src="js/chart-utils.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        /* 全局禁止滚动，占满视口 */
        body {
            background-color: #f5f5f5;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* 容器全屏布局 */
        .container {
            width: 100%;
            height: 100%;
            background: white;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        /* 标题样式 */
        .title {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin: 0;
            flex-shrink: 0;
        }
        /* 连接状态：右上角圆点+hover文字 */
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .status-text {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .status:hover .status-text {
            visibility: visible;
            opacity: 1;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #999; /* 连接中-灰色 */
            transition: background-color 0.3s ease;
        }
        /* 连接成功-绿色，失败-红色 */
        .status.connected .status-dot { background-color: #27ae60; }
        .status.failed .status-dot { background-color: #e74c3c; }

        /* 数据卡片布局 */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            flex-shrink: 0;
            padding: 0 5px;
        }
        .data-card {
            padding: 15px 10px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .data-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #42b983, #35495e);
            transition: left 0.3s ease;
        }
        .data-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .data-card:hover::before { left: 0; }
        .data-card h3 {
            color: #666;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            transition: all 0.5s ease;
        }
        .unit {
            font-size: 16px;
            color: #999;
            margin-left: 6px;
        }

        /* 图表区域（核心：移动端强制最小高度） */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex: 1;
            padding: 0 5px;
            min-height: 0;
        }
        .chart-container {
            height: 100%;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 200px; /* 移动端最小高度，避免高度为0 */
        }

        /* 响应式适配（移动端优化） */
        @media (max-width: 900px) {
            .data-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-container {
                grid-template-columns: 1fr;
                min-height: 400px; /* 单列时增加总高度 */
            }
            .chart-container { min-height: 200px; }
            .data-value { font-size: 24px; }
        }
        @media (max-width: 500px) {
            .data-grid { grid-template-columns: 1fr; }
            .title { font-size: 20px; }
            .status { top: 15px; right: 15px; }
            .chart-container { min-height: 180px; } /* 小屏再调整 */
            .data-value { font-size: 22px; }
            .data-card h3 { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">实时环境监控</h1>
        
        <!-- 连接状态：圆点+hover文字 -->
        <div class="status connecting" id="mqtt-status">
            <span class="status-text">连接中...</span>
            <span class="status-dot"></span>
        </div>
        
        <!-- 数据卡片 -->
        <div class="data-grid">
            <div class="data-card">
                <h3>温度</h3>
                <div class="data-value" id="temperature">25.8</div>
                <span class="unit">℃</span>
            </div>
            <div class="data-card">
                <h3>湿度</h3>
                <div class="data-value" id="humidity">62.5</div>
                <span class="unit">%</span>
            </div>
            <div class="data-card">
                <h3>风速</h3>
                <div class="data-value" id="windSpeed">3.2</div>
                <span class="unit">m/s</span>
            </div>
            <div class="data-card">
                <h3>光照强度</h3>
                <div class="data-value" id="illumination">850</div>
                <span class="unit">lux</span>
            </div>
        </div>

        <!-- 图表容器 -->
        <div class="charts-container">
            <div class="chart-container" id="main-chart"></div>
            <div class="chart-container" id="light-chart"></div>
        </div>
    </div>

    <script>
        // 页面加载完成初始化
        window.onload = function() {
            initMQTTClient(); // 先初始化MQTT
            initCharts();     // 后初始化图表

            // 窗口缩放适配
            window.addEventListener('resize', () => {
                if (window.mainChart) window.mainChart.resize();
                if (window.lightChart) window.lightChart.resize();
            });

            // 页面关闭断开MQTT
            window.onbeforeunload = function() {
                if (window.mqttClient && window.mqttClient.isConnected()) {
                    window.mqttClient.disconnect();
                }
            };
        };
    </script>
</body>
</html>
