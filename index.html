<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端滑动核心配置：允许触摸滚动 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, touch-action: pan-y">
    <title>实时环境监控</title>
    <script src="js/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/mqtt-client.js"></script>
    <script src="js/chart-utils.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        /* 1. 彻底允许移动端纵向滚动 */
        body {
            background-color: #f5f5f5;
            width: 100vw;
            overflow-x: hidden; /* 禁止横向滚动 */
            overflow-y: auto; /* 强制允许纵向滚动 */
            position: relative;
            padding: 10px 0; /* 上下留白，避免内容贴边 */
            -webkit-overflow-scrolling: touch; /* 开启移动端弹性滚动（兼容iOS） */
        }
        /* 2. 容器改用自然流布局（放弃flex，避免高度强制） */
        .container {
            width: 100%;
            background: white;
            padding: 20px 15px;
            margin: 0 auto;
        }
        /* 3. 标题样式：增加间距 */
        .title {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin: 0 0 25px 0; /* 底部间距，分隔标题和内容 */
            padding-top: 10px;
        }
        /* 4. 连接状态：固定在顶部，避免滚动时消失 */
        .status {
            position: fixed; /* 改为fixed，始终显示在右上角 */
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 999; /* 确保在最上层 */
            background: rgba(255,255,255,0.8); /* 增加背景，避免被内容遮挡 */
            padding: 2px 8px;
            border-radius: 15px;
        }
        .status-text {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .status:hover .status-text {
            visibility: visible;
            opacity: 1;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #999;
            transition: background-color 0.3s ease;
        }
        .status.connected .status-dot { background-color: #27ae60; }
        .status.failed .status-dot { background-color: #e74c3c; }

        /* 5. 数据卡片：自然流布局，增加间距 */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr; /* 移动端强制单列，避免挤压 */
            gap: 15px;
            margin: 0 0 30px 0; /* 底部大间距，分隔卡片和图表 */
        }
        .data-card {
            padding: 20px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.08);
        }
        .data-card h3 {
            color: #666;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .data-value {
            font-size: 30px;
            font-weight: bold;
            color: #2c3e50;
        }
        .unit {
            font-size: 16px;
            color: #999;
            margin-left: 6px;
        }

        /* 6. 图表区域：强制足够高度，避免堆叠 */
        .charts-container {
            display: block; /* 单列布局 */
            margin: 0 0 30px 0;
        }
        .chart-container {
            width: 100%;
            height: 300px; /* 移动端强制图表高度 */
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.08);
            margin-bottom: 20px; /* 图表之间的间距 */
        }

        /* 7. 大屏适配（非移动端恢复多列） */
        @media (min-width: 768px) {
            .data-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .charts-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            .chart-container {
                height: 350px;
            }
        }
        @media (min-width: 1024px) {
            .data-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">实时环境监控</h1>
        
        <!-- 连接状态：固定在右上角 -->
        <div class="status connecting" id="mqtt-status">
            <span class="status-text">连接中...</span>
            <span class="status-dot"></span>
        </div>
        
        <!-- 数据卡片（移动端单列） -->
        <div class="data-grid">
            <div class="data-card">
                <h3>温度</h3>
                <div class="data-value" id="temperature">25.8</div>
                <span class="unit">℃</span>
            </div>
            <div class="data-card">
                <h3>湿度</h3>
                <div class="data-value" id="humidity">62.5</div>
                <span class="unit">%</span>
            </div>
            <div class="data-card">
                <h3>风速</h3>
                <div class="data-value" id="windSpeed">3.2</div>
                <span class="unit">m/s</span>
            </div>
            <div class="data-card">
                <h3>光照强度</h3>
                <div class="data-value" id="illumination">850</div>
                <span class="unit">lux</span>
            </div>
        </div>

        <!-- 图表区域（移动端单列） -->
        <div class="charts-container">
            <div class="chart-container" id="main-chart"></div>
            <div class="chart-container" id="light-chart"></div>
        </div>
    </div>

    <script>
        // 页面加载完成初始化
        window.onload = function() {
            // 确保图表容器高度正确后再初始化
            setTimeout(() => {
                initMQTTClient();
                initCharts();
            }, 200);

            // 窗口缩放适配
            window.addEventListener('resize', () => {
                if (window.mainChart) window.mainChart.resize();
                if (window.lightChart) window.lightChart.resize();
            });

            // 页面关闭断开MQTT
            window.onbeforeunload = function() {
                if (window.mqttClient && window.mqttClient.isConnected()) {
                    window.mqttClient.disconnect();
                }
            };
        };
    </script>
</body>
</html>
